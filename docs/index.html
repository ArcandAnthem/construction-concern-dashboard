<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Construction Concern — Content Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F7F4F0;
      --surface:    #FFFFFF;
      --border:     #E8E2D9;
      --text:       #1C1C1C;
      --muted:      #6B6566;
      --accent:     #C4622D;
      --accent-lt:  #F5E8DF;
      --blue:       #2B5B72;
      --blue-lt:    #E0EDF2;
      --green:      #2A7A50;
      --green-lt:   #DFF0E8;
      --yellow:     #9A6B00;
      --yellow-lt:  #FFF3CC;
      --red:        #B53B2A;
      --red-lt:     #FCEAE7;
      --gray-lt:    #F0ECEB;
      --radius:     10px;
      --shadow:     0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    .topbar {
      background: var(--text);
      color: #fff;
      padding: 10px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      letter-spacing: .03em;
    }
    .topbar-brand { font-weight: 600; color: var(--accent); letter-spacing: .06em; text-transform: uppercase; }
    .topbar-meta { color: #aaa; }

    header {
      <div class="banner">
        <div class="banner-icon">+</div>
        <div class="banner-text">
          <strong>Month Status: Strong Owned-Content Signals · Social Being Repositioned</strong>
          <p>The latest Wix and Later reports show that search, blog content, trust pages, and reliable email delivery are the strongest parts of the system right now. July should build harder on those channels while social shifts into a support role instead of carrying the growth target.</p>
        </div>
      </div>

      <div class="section">
        <div class="section-title">What Is Working Right Now</div>
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">Search + Direct Sessions</div>
            <div class="kpi-value val-green">499</div>
            <div class="kpi-trend trend-up">Upstream traffic is coming from the right places</div>
            <div class="kpi-note">Current visitor-source window: direct 264 + Google organic 235</div>
          </div>

          <div class="kpi-card">
            <div class="kpi-label">Homepage Sessions</div>
            <div class="kpi-value">296</div>
            <div class="kpi-trend trend-up">Brand interest is still healthy</div>
            <div class="kpi-note">252 unique visitors in the current traffic window</div>
          </div>

          <div class="kpi-card">
            <div class="kpi-label">Top Blog Views</div>
            <div class="kpi-value val-green">163</div>
            <div class="kpi-trend trend-up">Boxed-eaves fire-safety remains the lead asset</div>
            <div class="kpi-note">128 unique visitors on the strongest post</div>
          </div>

          <div class="kpi-card">
            <div class="kpi-label">Contact Page Sessions</div>
            <div class="kpi-value">99</div>
            <div class="kpi-trend trend-up">Trust-page demand is real</div>
            <div class="kpi-note">About Us added 74 more sessions in the same window</div>
          </div>

          <div class="kpi-card">
            <div class="kpi-label">Newsletter Deliveries</div>
            <div class="kpi-value">523</div>
            <div class="kpi-trend trend-up">The list is still reachable</div>
            <div class="kpi-note">June 30 send delivered to 523 recipients; May 26 delivered to 529</div>
          </div>

          <div class="kpi-card">
            <div class="kpi-label">Boxed-Eaves Search Impressions</div>
            <div class="kpi-value">320</div>
            <div class="kpi-trend trend-up">Non-brand demand is established</div>
            <div class="kpi-note">`boxed eaves` 127 + `boxed in eaves` 110 + `boxed eaves fire protection` 83</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Channel Review — What Is Working and What Needs Correction</div>
        <div class="table-card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Channel</th>
                  <th>What Is Working</th>
                  <th>What Needs Correction</th>
                  <th>Our Move</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><strong>Website + Search</strong></td>
                  <td>Direct and Google generated 499 sessions in the current source window. The home page drew 296 sessions, Contact drew 99, and About Us drew 74.</td>
                  <td>Traffic clusters around trust pages more than service and estimate pages, so confidence is building faster than conversion intent.</td>
                  <td>Strengthen internal links and calls to action from the pages people already trust.</td>
                </tr>
                <tr>
                  <td><strong>Blog</strong></td>
                  <td>The boxed-eaves fire-safety post produced 163 views and 128 unique visitors. Search demand around boxed eaves and fire protection is established.</td>
                  <td>Newer blog posts have not approached the lead article, so topic selection needs to stay tighter.</td>
                  <td>Publish more sequels and adjacent posts around fire protection, soffits, and diagnostic exterior problems.</td>
                </tr>
                <tr>
                  <td><strong>Newsletter</strong></td>
                  <td>The recent sends still reached the list reliably with 523 and 529 deliveries.</td>
                  <td>Both visible sends produced only 6 unique clicks, or about a 1.1% click rate.</td>
                  <td>Focus each email on one clear problem, one featured article, and one stronger next-step CTA.</td>
                </tr>
                <tr>
                  <td><strong>Instagram</strong></td>
                  <td>Instagram still generated 243 June views and held the audience at 364 followers.</td>
                  <td>Reach stayed soft at 73 for the month, and follower count slipped by 1.</td>
                  <td>Keep posting, but use fewer, sharper educational posts tied to the strongest blog and newsletter topics.</td>
                </tr>
                <tr>
                  <td><strong>Threads</strong></td>
                  <td>Threads maintained light visibility with 35 June views.</td>
                  <td>Engagement is minimal at 4 likes and no replies, reposts, or quotes.</td>
                  <td>Keep Threads low-effort and repurposed; it should support the campaign, not lead it.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">The Winning Strategy</div>
        <div class="highlight-card" style="margin-bottom:20px;">
          <p>Construction Concern should continue social media posting, but social should no longer be treated as the lead growth engine. The winning model right now is blog-led, newsletter-backed, and social-amplified. In other words: do more with blogs and newsletters, and use social to extend the reach of the topics that are already proving themselves.</p>
        </div>
        <div class="two-col">
          <div class="highlight-card">
            <h3>Primary Growth Engine: Blog + Newsletter</h3>
            <ul class="highlight-list">
              <li>
                <span class="hl-icon">1</span>
                <div class="hl-text">
                  <strong>Lead With Proven Topics</strong>
                  <span>Build around boxed eaves, fire protection, soffits, hot-room diagnostics, and whole-home problem solving.</span>
                </div>
              </li>
              <li>
                <span class="hl-icon">2</span>
                <div class="hl-text">
                  <strong>Use Newsletter as Nurture</strong>
                  <span>Turn the strongest article into an email with one clear takeaway and one clear next step.</span>
                </div>
              </li>
              <li>
                <span class="hl-icon">3</span>
                <div class="hl-text">
                  <strong>Follow Real Demand</strong>
                  <span>Let search queries and top-performing web pages set the monthly agenda.</span>
                </div>
              </li>
            </ul>
          </div>

          <div class="highlight-card">
            <h3>Support Layer: Social</h3>
            <ul class="highlight-list">
              <li>
                <span class="hl-icon">1</span>
                <div class="hl-text">
                  <strong>Keep Instagram Active</strong>
                  <span>Use short, practical, saveable posts that pull directly from the strongest blog and newsletter themes.</span>
                </div>
              </li>
              <li>
                <span class="hl-icon">2</span>
                <div class="hl-text">
                  <strong>Keep Threads Light</strong>
                  <span>Repurpose only. Threads should reinforce the message, not consume the main effort.</span>
                </div>
              </li>
              <li>
                <span class="hl-icon">3</span>
                <div class="hl-text">
                  <strong>Change the Success Metric</strong>
                  <span>Use social to build recognition, trust, saves, and conversations instead of expecting it to drive most traffic.</span>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">What Needs to Be Fixed Now</div>
        <div class="highlight-card">
          <ul class="action-list">
            <li>
              <div class="action-num">1</div>
              <div class="action-body">
                <strong>Tighten the conversion path from trust pages to service and estimate pages</strong>
                <p>The traffic is reaching the right reassurance pages first. Those pages now need clearer next steps.</p>
              </div>
            </li>
            <li>
              <div class="action-num">2</div>
              <div class="action-body">
                <strong>Make newsletters more focused and more actionable</strong>
                <p>Each send should center on one homeowner problem, one featured article, and one primary CTA.</p>
              </div>
            </li>
            <li>
              <div class="action-num">3</div>
              <div class="action-body">
                <strong>Keep blog topics closer to the proven lane</strong>
                <p>The current winner is not broad summer content. It is practical fire-protection and exterior-diagnostic education.</p>
              </div>
            </li>
            <li>
              <div class="action-num">4</div>
              <div class="action-body">
                <strong>Use more real project proof wherever possible</strong>
                <p>Trust is already a strength for this brand, and authentic project evidence will reinforce it.</p>
              </div>
            </li>
          </ul>
        </div>
      </div>

      <div class="section">
        <div class="section-title">What Needs to Go</div>
        <div class="highlight-card">
          <ul class="checklist">
            <li><span class="check-done">✓</span> Remove generic seasonal filler that is not tied to a proven homeowner problem or search signal.</li>
            <li><span class="check-done">✓</span> Remove the assumption that social posts should drive most discovery on their own.</li>
            <li><span class="check-done">✓</span> Remove channel sprawl, where every platform gets equal energy regardless of results.</li>
            <li><span class="check-done">✓</span> Remove standalone posts that are disconnected from the stronger blog and newsletter themes.</li>
          </ul>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Web Addresses Reviewed This Month</div>
        <div class="highlight-card">
          <ul class="checklist">
            <li><span class="check-done">✓</span> https://www.constructionconcern.com/</li>
            <li><span class="check-done">✓</span> https://www.constructionconcern.com/contact</li>
            <li><span class="check-done">✓</span> https://www.constructionconcern.com/about-us</li>
            <li><span class="check-done">✓</span> https://www.constructionconcern.com/request-free-estimate</li>
            <li><span class="check-done">✓</span> https://www.constructionconcern.com/blog</li>
            <li><span class="check-done">✓</span> https://www.constructionconcern.com/post/boxed-in-eaves-fire-safety</li>
          </ul>
        </div>
      </div>

  </div><!-- /container -->
